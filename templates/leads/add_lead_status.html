{% extends "base.html" %}

{% block content %}

<style>

.container{
    width:100%;
}

.card{
    background:#13161d;
    padding:20px;
    border-radius:12px;
    border:1px solid #222;
}

.form-flex{
    display:flex;
    gap:14px;
}

input,select{

    flex:1;

    padding:12px;

    background:#1a1e28;

    border:1px solid #2a2f3a;

    border-radius:8px;

    color:white;

    outline:none;
}

.btn{

    background:#4f7cff;

    border:none;

    padding:12px 18px;

    border-radius:8px;

    color:white;

    cursor:pointer;


}

</style>

<div class="container">

{% if messages %}

    {% for message in messages %}

        <script>

            Swal.fire({

                title:'Success',

                text:'{{ message }}',

                icon:'success',

                background:'#13161d',

                color:'white',

                confirmButtonColor:'#4f7cff',

                showDenyButton:true,

                confirmButtonText:'Add More',

                denyButtonText:'Go Back'

            }).then((result)=>{

                if(result.isDenied){

                    window.location.href='/lead-status/';

                }

            });

        </script>

    {% endfor %}

{% endif %}
<div class="page-header">
    <a href="/lead-status/">← Back</a>
</div>
<div class="card">

<h2 style="margin-bottom:20px;">

    Create Lead Status

</h2>

<form method="POST">

    {% csrf_token %}

    <div class="form-flex">

        <input
            type="text"
            name="lead_status_name"
            placeholder="Lead Status Name"
            required
        >

        <select name="leadstatus_status">

            <option value="active">

                Active

            </option>

            <option value="inactive">

                Inactive

            </option>

        </select>

        <button class="btn">

            Add Status

        </button>

    </div>

</form>

</div>

</div>

{% endblock %}
