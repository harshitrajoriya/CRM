<!-- templates/project/edit_project.html -->

{% extends "base.html" %}

{% block content %}

<style>

.container{
    width:100%;
}

.page-header{
    margin-bottom:20px;
}

.card{
    background:#13161d;
    border:1px solid #222;
    border-radius:12px;
    padding:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.form-group label{
    color:#cbd5e1;
    font-size:14px;
    font-weight:500;
}

.form-grid input,
.form-grid textarea,
.form-grid select{
    width:100%;
    padding:12px;
    background:#1a1e28;
    border:1px solid #2a2f3a;
    border-radius:8px;
    color:white;
    outline:none;
    font-size:14px;
}

.form-grid textarea{
    resize:none;
    height:120px;
}

.form-grid input:focus,
.form-grid textarea:focus,
.form-grid select:focus{
    border-color:#4f7cff;
}

.full-width{
    grid-column:span 2;
}

.btn{
    background:#4f7cff;
    border:none;
    padding:12px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-size:14px;
    transition:.2s;
    width:180px;
}

.btn:hover{
    background:#3d68e0;
}

.back-btn{
    text-decoration:none;
    color:#aaa;
}

.back-btn:hover{
    color:#4f7cff;
}

.project-id{
    color:#4f7cff;
    font-size:14px;
    margin-bottom:20px;
}

@media(max-width:900px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .full-width{
        grid-column:span 1;
    }
}

</style>

<div class="container">
{% if messages %}

    {% for message in messages %}

        {% if "Project Updated Successfully" in message|stringformat:"s" %}

            <script>

                Swal.fire({

                    title: 'Success',

                    text: 'Project Updated Successfully',

                    icon: 'success',

                    background: '#13161d',

                    color: 'white',

                    confirmButtonColor: '#4f7cff',

                    showDenyButton: true,

                    confirmButtonText: 'Edit Again',

                    denyButtonText: 'Go Back'

                }).then((result) => {

                    // EDIT AGAIN

                    if(result.isConfirmed){

                        location.reload();

                    }

                    // GO BACK

                    else if(result.isDenied){

                        window.location.href = "/project/";

                    }

                });

            </script>

        {% endif %}

    {% endfor %}

{% endif %}
    <div class="page-header">

        <a href="/project/" class="back-btn">

            ← Back

        </a>

    </div>

    <div class="card">

        <h2 style="margin-bottom:10px;">

            Edit Project

        </h2>

        <div class="project-id">

            {{ project.project_id }}

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="form-grid">

                <!-- PROJECT NAME -->

                <div class="form-group">

                    <label>
                        Project Name *
                    </label>

                    <input
                        type="text"
                        name="project_name"
                        value="{{ project.project_name }}"
                        required
                    >

                </div>

                <!-- CLIENT NAME -->

                <div class="form-group">

                    <label>
                        Client Name *
                    </label>

                    <input
                        type="text"
                        name="client_name"
                        value="{{ project.client_name }}"
                        required
                    >

                </div>

                <!-- START DATE -->

                <div class="form-group">

                    <label>
                        Start Date
                    </label>

                    <input
                        type="date"
                        name="start_date"
                        value="{{ project.start_date|date:'Y-m-d' }}"
                    >

                </div>

                <!-- END DATE -->

                <div class="form-group">

                    <label>
                        End Date
                    </label>

                    <input
                        type="date"
                        name="end_date"
                        value="{{ project.end_date|date:'Y-m-d' }}"
                    >

                </div>

                <!-- ASSIGN TO -->

                <div class="form-group">

                    <label>
                        Assign Employee *
                    </label>

                    <select
                        name="assign_to"
                        required
                    >

                        <option value="">
                            Select Employee
                        </option>

                        {% for e in employees %}

                        <option
                            value="{{ e.id }}"
                            {% if project.assign_to.id == e.id %}
                                selected
                            {% endif %}
                        >

                            {{ e.employee_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <!-- PRIORITY -->

                <div class="form-group">

                    <label>
                        Priority *
                    </label>

                    <select
                        name="priority"
                        required
                    >

                        <option
                            value="high"
                            {% if project.priority == "high" %}
                                selected
                            {% endif %}
                        >
                            High
                        </option>

                        <option
                            value="medium"
                            {% if project.priority == "medium" %}
                                selected
                            {% endif %}
                        >
                            Medium
                        </option>

                        <option
                            value="low"
                            {% if project.priority == "low" %}
                                selected
                            {% endif %}
                        >
                            Low
                        </option>

                    </select>

                </div>

                <!-- STATUS -->

                <div class="form-group">

                    <label>
                        Status *
                    </label>

                    <select
                        name="status"
                        required
                    >

                        <option
                            value="not started"
                            {% if project.status == "not started" %}
                                selected
                            {% endif %}
                        >
                            Not Started
                        </option>

                        <option
                            value="in progress"
                            {% if project.status == "in progress" %}
                                selected
                            {% endif %}
                        >
                            In Progress
                        </option>

                        <option
                            value="on hold"
                            {% if project.status == "on hold" %}
                                selected
                            {% endif %}
                        >
                            On Hold
                        </option>

                        <option
                            value="completed"
                            {% if project.status == "completed" %}
                                selected
                            {% endif %}
                        >
                            Completed
                        </option>

                    </select>

                </div>

                <!-- DESCRIPTION -->

                <div class="form-group full-width">

                    <label>
                        Project Description *
                    </label>

                    <textarea
                        name="project_description"
                        required
                    >{{ project.project_description }}</textarea>

                </div>

                <!-- BUTTON -->

                <button class="btn full-width">

                    Update Project

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
