{% extends "base.html" %}

{% block content %}

<style>

.container{
    width:100%;
}

.card{
    background:#13161d;
    padding:20px;
    border-radius:12px;
    border:1px solid #222;
    margin-bottom:20px;
}

.form-flex{
    display:flex;
    gap:12px;
    margin-bottom:20px;
}

.form-flex input,
.form-flex select{
    flex:1;
    padding:12px;
    background:#1a1e28;
    border:1px solid #2a2f3a;
    border-radius:8px;
    color:white;
}

.btn{
    background:#4f7cff;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

.table-wrap{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    padding:12px;
    color:#888;
}

td{
    padding:14px 12px;
    border-top:1px solid #222;
}

.status{
    padding:6px 10px;
    border-radius:20px;
    font-size:12px;
}

.active{
    background:rgba(40,199,111,.15);
    color:#28c76f;
}

.inactive{
    background:rgba(234,84,85,.15);
    color:#ea5455;
}

.delete-btn{
    color:#ea5455;
    text-decoration:none;
}

</style>

<div class="container">
    <div class="page-header">

        <a href="/lead-type/" class="back-btn">
            ← Back
        </a>

    </div>
    <br>

    <div class="card">

        <h2>Create Lead Type</h2>

        <form method="POST">

            {% csrf_token %}

            <div class="form-flex">

                <input
                    type="text"
                    name="for_type_name"
                    placeholder="Type Name"
                    required
                >

                <select name="for_type_status">

                    <option value="active">
                        Active
                    </option>

                    <option value="inactive">
                        Inactive
                    </option>

                </select>

                <button class="btn">
                    Add Type
                </button>

            </div>

        </form>

    </div>


{% endblock %}
