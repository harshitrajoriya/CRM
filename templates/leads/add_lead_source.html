{% extends "base.html" %}

{% block content %}

<style>

.container{
    width:100%;
}

.card{
    background:#13161d;
    padding:20px;
    border-radius:12px;
    border:1px solid #222;
    margin-bottom:20px;
}

.form-flex{
    display:flex;
    gap:12px;
    margin-bottom:20px;
}

.form-flex input,
.form-flex select{
    flex:1;
    padding:12px;
    background:#1a1e28;
    border:1px solid #2a2f3a;
    border-radius:8px;
    color:white;
    outline:none;
}

.btn{
    background:#4f7cff;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

.btn:hover{
    background:#3d68e0;
}

.back-btn{
    color:#aaa;
    text-decoration:none;
}

.back-btn:hover{
    color:#4f7cff;
}

/* POPUP */

.popup{
    position:fixed;
    top:20px;
    right:20px;
    min-width:260px;
    padding:14px 18px;
    border-radius:10px;
    color:white;
    z-index:9999;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    animation:slideIn .3s ease;
}

.popup.success{
    background:#22c55e;
}

.popup.error{
    background:#ef4444;
}

@keyframes slideIn{

    from{
        opacity:0;
        transform:translateX(100%);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }
}

</style>

<div class="container">

    <!-- POPUP -->

    {% if messages %}

        {% for message in messages %}

            <div class="popup {{ message.tags }}">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}

    <!-- BACK -->

    <div class="page-header">

        <a href="/lead-source/" class="back-btn">
            ← Back
        </a>

    </div>

    <br>

    <!-- CARD -->

    <div class="card">

        <h2 style="margin-bottom:20px;">
            Create Lead Source
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="form-flex">

                <input
                    type="text"
                    name="lead_source_name"
                    placeholder="Lead Source Name"
                    required
                >

                <select name="lead_status">

                    <option value="active">
                        Active
                    </option>

                    <option value="inactive">
                        Inactive
                    </option>

                </select>

                <button class="btn" type="submit">

                    Add Source

                </button>

            </div>

        </form>

    </div>

</div>

<script>

/* AUTO HIDE POPUP */

setTimeout(() => {

    document
    .querySelectorAll('.popup')
    .forEach((popup) => {

        popup.style.display = 'none';

    });

}, 3000);

</script>

{% endblock %}
