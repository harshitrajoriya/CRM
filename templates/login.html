<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container {
    background:white;
    padding:40px;
    border-radius:15px;
    width:100%;
    max-width:380px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h2 {
    text-align:center;
    margin-bottom:20px;
}

.input-group {
    margin-bottom:15px;
}

.input-group input {
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

.btn {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover {
    background:#5a67d8;
}

.error {
    background:#ffe0e0;
    color:#c0392b;
    padding:10px;
    border-radius:6px;
    margin-bottom:10px;
    font-size:14px;
}

.footer {
    text-align:center;
    margin-top:15px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

    <h2>Login</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <input type="email" name="email" placeholder="email" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button class="btn">Login</button>
    </form>

</div>

</body>
</html>
