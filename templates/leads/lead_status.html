{% extends "base.html" %}

{% block content %}

<style>

.container{
    width:100%;
}

.card{
    background:#13161d;
    padding:20px;
    border-radius:12px;
    border:1px solid #222;
}

.btn{
    background:#4f7cff;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    text-decoration:none;
    width:140px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:14px;
    border-bottom:1px solid #222;
    text-align:left;
}

.status-btn{

    padding:7px 14px;

    border-radius:20px;

    text-decoration:none;

    font-size:12px;

    color:white;
}

.active{
    background:#22c55e;
}

.inactive{
    background:#ef4444;
}

.delete-btn{

    background:#ef4444;

    padding:7px 14px;

    border-radius:8px;

    color:white;

    text-decoration:none;
}

</style>

<div class="container">

{% if messages %}

    {% for message in messages %}

        <script>

            Swal.fire({

                title: 'Success',

                text: '{{ message }}',

                icon: 'success',

                background: '#13161d',

                color: 'white',

                confirmButtonColor: '#4f7cff'

            });

        </script>

    {% endfor %}

{% endif %}

<a href="/add-lead-status/" class="btn">

    Add Lead Status

</a>

<br><br>

<div class="card">

<table>

    <thead>

        <tr>

            <th>#</th>

            <th>Status Name</th>

            <th>Status</th>

            <th>Action</th>

        </tr>

    </thead>

    <tbody>

        {% for s in statuses %}

        <tr>

            <td>

                {{ forloop.counter }}

            </td>

            <td>

                {{ s.lead_status_name }}

            </td>

            <td>

                <a
                    href="/active-lead-status/{{ s.id }}/"
                    class="status-btn {{ s.leadstatus_status }}"
                >

                    {{ s.leadstatus_status }}

                </a>

            </td>

            <td>

                <a
                    href="/delete-lead-status/{{ s.id }}/"
                    class="delete-btn"
                    onclick="deleteStatus(event,this.href)"
                >

                    Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

</div>

</div>

<script>

function deleteStatus(event,url){

    event.preventDefault();

    Swal.fire({

        title:'Delete Lead Status?',

        text:'This action cannot be undone.',

        icon:'warning',

        background:'#13161d',

        color:'white',

        showCancelButton:true,

        confirmButtonColor:'#ef4444',

        cancelButtonColor:'#4f7cff',

        confirmButtonText:'Yes Delete'

    }).then((result)=>{

        if(result.isConfirmed){

            window.location.href = url;

        }

    });

}

</script>

{% endblock %}
